<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof. William Paiva - 2026 - COTIL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">


<style>
    :root {
        --primary: #00d2ff;
        --secondary: #3a7bd5;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --text-main: #2d3748;
        --card-bg: rgba(255, 255, 255, 0.8);
    }

    /* --- ESTILOS GERAIS --- */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: 'Roboto Mono', monospace;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* --- CONTAINER PRINCIPAL --- */
    .container {
        width: 95%;
        max-width: 900px;
        padding: 3rem 1rem;
        box-sizing: border-box;
    }

    /* --- TÍTULO --- */
    .main-title {
        color: #1a202c;
        font-size: 2.2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 4rem;
        letter-spacing: -1px;
        position: relative;
    }

    .main-title::after {
        content: '';
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        border-radius: 2px;
    }

    /* --- LISTA HIERÁRQUICA --- */
    .hierarchical-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    
    .folder-header {
        display: flex;
        align-items: center;
        padding: 1.2rem 1.5rem;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        font-weight: 700;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    .folder-header:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        background: #ffffff;
    }
    
    /* Ícone Moderno */
    .folder-header::before {
        content: '→';
        display: inline-block;
        margin-right: 1rem;
        color: var(--secondary);
        transition: transform 0.3s ease;
    }
    
    .folder.open > .folder-header::before {
        transform: rotate(90deg);
        color: var(--primary);
    }

    .folder-content {
        display: none;
        padding-left: 1rem;
        margin-left: 1rem;
        border-left: 2px dashed rgba(58, 123, 213, 0.3);
        animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .folder.open > .folder-content {
        display: block;
    }

    /* Item de Link Estilizado */
    .link-item {
        display: block;
        padding: 0.8rem 1.2rem;
        color: #4a5568;
        text-decoration: none;
        border-radius: 8px;
        margin: 0.4rem 0;
        font-size: 0.95rem;
        transition: all 0.2s;
        border: 1px solid transparent;
    }
    
    .link-item:hover {
        background: rgba(0, 210, 255, 0.1);
        color: var(--secondary);
        padding-left: 1.5rem;
        border-left: 4px solid var(--primary);
    }

    /* --- RESPONSIVIDADE --- */
    @media (max-width: 768px) {
        .main-title { font-size: 1.5rem; }
        .container { padding: 1.5rem 0.5rem; }
    }
</style></head>
<body>
    
    <div class="container">
        <h1 class="main-title">Prof. William Paiva - 2026 - COTIL</h1>
        
        <div id="hierarchical-list" class="hierarchical-list"></div>
    </div>

    <script>
        const listContainer = document.getElementById('hierarchical-list');

        /**
         * Cria recursivamente os nós (pastas e links) da lista.
         * @param {object} item - O objeto de dados para o nó atual.
         * @returns {HTMLElement} O elemento HTML criado.
         */
        function createNode(item) {
            // Se for uma pasta com itens dentro
            if (item.folder && item.items) {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder';

                const header = document.createElement('div');
                header.className = 'folder-header';
                header.textContent = item.folder;

                const content = document.createElement('div');
                content.className = 'folder-content';
                
                // Adiciona o evento de clique para expandir/recolher
                header.addEventListener('click', () => {
                    folderDiv.classList.toggle('open');
                });

                // Cria os nós filhos recursivamente
                item.items.forEach(childItem => {
                    content.appendChild(createNode(childItem));
                });

                folderDiv.appendChild(header);
                folderDiv.appendChild(content);
                return folderDiv;
            }
            // Se for um link final
            else if (item.text && item.link) {
                const linkItem = document.createElement('a');
                linkItem.href = item.link;
                linkItem.textContent = item.text;
                linkItem.className = 'link-item';
                return linkItem;
            }

            // Retorna um fragmento vazio se o item for inválido
            return document.createDocumentFragment();
        }

        /**
         * Gera a lista completa a partir dos dados.
         * @param {Array} data - O array de dados hierárquicos.
         */
        function generateHierarchicalList(data) {
            listContainer.innerHTML = '';
            data.forEach(item => {
                listContainer.appendChild(createNode(item));
            });
        }


        /**
         * Carrega os dados das disciplinas do arquivo JSON externo.
         */
        async function loadClasses() {
            try {
                // Faz a requisição para o arquivo JSON
                const response = await fetch('links.json');
                
                // Verifica se a requisição foi bem-sucedida
                if (!response.ok) {
                    throw new Error(`Erro na requisição: ${response.status}`);
                }
                
                // Converte a resposta para JSON
                const data = await response.json();
                
                // Chama a função para criar a lista com os dados carregados
                generateHierarchicalList(data);

            } catch (error) {
                // Em caso de erro, exibe uma mensagem no console e na página
                console.error("Falha ao carregar o arquivo links.json:", error);
                listContainer.innerHTML = '<p style="text-align: center;">Não foi possível carregar a lista de disciplinas.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadClasses);
    </script>
</body>
</html>
