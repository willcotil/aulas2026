        body {

        .terminal-box {

            color: #4AF626;

        .terminal-prompt::before {

            color: #8B5DFF;

        }

        /* SVG Styles */
        .node-rect { fill: #ffffff; stroke: #563A9C; stroke-width: 4; rx: 12px; }
        .node-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; fill: #563A9C; }

        code { font-family: 'JetBrains Mono', monospace; background: #ffffff; border: 2px solid #563A9C; padding: 2px 8px; border-radius: 6px; color: #563A9C; font-weight: 700; }
        .code-block { background: #f4f4f5; border: 2px solid #e4e4e7; padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; color: #3f3f46; font-size: 14px; }

    <script>
        const steps = [
            // ── 01: Título ──────────────────────────────────────────────────
            {
                title: "O Poder do Terminal",
                content: `
                    <div class="text-center space-y-8 py-10">
                        <div class="inline-block p-8 bg-white border-4 border-brand-dark rounded-[2rem] text-brand-primary mb-4 shadow-xl shadow-brand-dark/10" aria-hidden="true">
                            <i class="fas fa-terminal text-8xl"></i>
                        </div>
                        <h2 class="text-5xl md:text-6xl font-black text-brand-dark leading-tight">Dominando o Gemini CLI</h2>
                        <div class="bg-brand-muted p-6 rounded-2xl border-l-8 border-brand-primary max-w-3xl mx-auto text-left text-brand-dark font-medium">
                            <p class="text-xl font-semibold text-center mb-2">Chegou a hora de sair da interface web e levar a IA para o seu ambiente de desenvolvimento:</p>
                            <p class="text-3xl font-black text-brand-primary text-center uppercase tracking-tight">Automação, Agentes e Linha de Comando!</p>
                        </div>
                        <div class="flex justify-center gap-4 text-brand-dark text-sm mt-12 font-bold opacity-70">
                            <span class="px-4 py-2 bg-white rounded-xl shadow-sm border-2 border-brand-dark/20" aria-hidden="true"><i class="fas fa-arrow-left mr-2"></i> USE AS SETAS PARA NAVEGAR <i class="fas fa-arrow-right ml-2"></i></span>
                        </div>
                    </div>
                `
            },
            // ── 02: O que é Gemini CLI ───────────────────────────────────
            {
                title: "O Que é o Gemini CLI?",
                content: `
                    <div class="space-y-6">
                        <div class="p-8 bg-white rounded-3xl shadow-lg border-2 border-brand-dark/10 text-lg">
                            <p class="leading-relaxed font-medium">
                                O <strong>Gemini CLI</strong> (Command Line Interface) é uma ferramenta poderosa que permite interagir com os modelos do Google Gemini diretamente pelo seu terminal, sem precisar abrir o navegador.
                            </p>
                            <p class="leading-relaxed font-medium mt-4">
                                Por que isso é um superpoder para desenvolvedores?
                            </p>
                            <ul class="mt-6 space-y-4 font-bold">
                                <li class="flex items-center gap-3 p-4 bg-brand-muted rounded-xl border border-brand-dark/10">
                                    <i class="fas fa-bolt text-brand-primary text-2xl"></i>
                                    <span>Velocidade: Faça perguntas rápidas enquanto codifica.</span>
                                </li>
                                <li class="flex items-center gap-3 p-4 bg-brand-muted rounded-xl border border-brand-dark/10">
                                    <i class="fas fa-cogs text-brand-primary text-2xl"></i>
                                    <span>Integração: Conecte respostas da IA em seus scripts.</span>
                                </li>
                                <li class="flex items-center gap-3 p-4 bg-brand-muted rounded-xl border border-brand-dark/10">
                                    <i class="fas fa-users-cog text-brand-primary text-2xl"></i>
                                    <span>Agentes: Crie personas especializadas para tarefas específicas.</span>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="p-6 bg-brand-dark text-white rounded-2xl shadow-xl border-b-4 border-brand-primary text-center text-brand-muted">
                            <p class="text-xl font-bold">Com o CLI, a Inteligência Artificial passa a morar <span class="text-brand-muted font-black underline">dentro do seu projeto</span>.</p>
                        </div>
                    </div>
                `
            },
            // ── 03: Instalação ─────────────────────────────────────────
            {
                title: "Como Rodar o Gemini CLI",
                content: `
                    <div class="space-y-6">
                        <p class="text-xl text-brand-dark font-semibold text-center">Temos dois caminhos diferentes dependendo de onde você está programando:</p>
                        
                        <div class="grid md:grid-cols-2 gap-8">
                            <!-- Em Casa -->
                            <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-brand-dark/20 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-2 bg-brand-primary"></div>
                                <h3 class="text-2xl font-black text-brand-dark mb-4 mt-2 uppercase flex items-center gap-2"><i class="fas fa-home"></i> Em Casa</h3>
                                <p class="mb-4 font-medium opacity-90 text-sm">No seu computador, onde você tem permissão total, instale globalmente via <strong>npm</strong>. Isso permite usar o comando <code>gemini</code> de forma nativa.</p>
                                
                                <div class="terminal-box mt-4 text-sm">
                                    <p class="terminal-prompt">npm install -g @google/gemini-cli</p>
                                </div>
                            </div>

                            <!-- Na Sala -->
                            <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-brand-dark/20 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-2 bg-brand-secondary"></div>
                                <h3 class="text-2xl font-black text-brand-dark mb-4 mt-2 uppercase flex items-center gap-2"><i class="fas fa-school"></i> Na Sala de Aula</h3>
                                <p class="mb-4 font-medium opacity-90 text-sm">Devido às restrições de permissão nos computadores da escola, não podemos instalar globalmente. Vamos usar o <strong>npx</strong> para baixar e rodar diretamente do repositório oficial.</p>
                                
                                <div class="terminal-box mt-4 text-sm">
                                    <p class="terminal-prompt">npx @google/gemini-cli</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            // ── 04: O /init ────────────────────────────────────
            {
                title: "Preparando o Terreno: O comando /init",
                content: `
                    <div class="space-y-6">
                        <div class="flex items-center gap-6 p-6 bg-brand-muted rounded-3xl border-l-8 border-brand-primary shadow-sm text-brand-dark">
                            <i class="fas fa-folder-open text-5xl" aria-hidden="true"></i>
                            <div>
                                <h3 class="text-2xl font-black">Indo com Calma</h3>
                                <p class="text-lg font-medium opacity-80 mt-1">Antes de usar os superpoderes, precisamos dar o contexto do projeto à IA.</p>
                            </div>
                        </div>
                        
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                            <p class="font-bold text-brand-dark text-lg mb-2">
                                1. Navegue até o diretório do seu projeto.<br>
                                2. Digite apenas <code>gemini</code> (ou <code>npx @google/gemini-cli</code> na sala) para abrir o <strong>modo interativo</strong>.<br>
                                3. Dentro do modo interativo, digite <code>/init</code>.
                            </p>
                            <p class="text-sm italic font-bold text-brand-primary mb-4">* Não se preocupe, eu farei esse passo a passo com vocês agora num projeto meu!</p>
                            
                            <div class="terminal-box text-sm">
                                <p class="terminal-prompt">cd meu-projeto-de-aula</p>
                                <p class="terminal-prompt">npx @google/gemini-cli</p>
                                <p class="text-gray-400 mt-2">Bem-vindo ao modo interativo! O que deseja fazer?</p>
                                <p class="text-white mt-1">> /init</p>
                                <p class="text-brand-secondary mt-2">✔ Arquivo GEMINI.md criado com sucesso!</p>
                            </div>

                            <div class="mt-6 p-4 bg-brand-muted rounded-xl border border-brand-dark/10 font-medium">
                                <p><i class="fas fa-info-circle text-brand-primary mr-2"></i> <strong>O que esse /init faz na prática?</strong></p>
                                <p class="text-sm mt-2">Ele cria um arquivo chamado <code>GEMINI.md</code> na pasta do projeto. É neste arquivo que fica salva a <strong>descrição geral do seu projeto</strong>, e o Gemini usará esse documento como um <em>guia mestre</em> para entender o contexto de tudo que vocês vão desenvolver juntos.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            // ── 05: Comandos Básicos ───────────────────────────────────────────
            {
                title: "Conceitos e Slash Commands",
                content: `
                    <div class="space-y-6">
                        <p class="text-lg font-medium text-brand-dark text-center mb-6">Como agora estamos dentro do <strong>modo interativo</strong>, usamos a barra <code>/</code> para enviar comandos especiais (Slash Commands):</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Comando Ask -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                                <h4 class="font-black text-xl text-brand-dark mb-2"><code class="bg-brand-muted text-brand-dark text-lg">/ask</code></h4>
                                <p class="font-medium opacity-90 text-sm mb-3">Faz uma pergunta rápida e direta ao modelo.</p>
                                <div class="terminal-box text-xs p-3">
                                    <p class="text-white mt-1">> /ask "Qual a porta padrão do React?"</p>
                                    <p class="text-white mt-1">A porta padrão do React (Create React App) é a 3000.</p>
                                </div>
                            </div>
                            
                            <!-- Comando Chat -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                                <h4 class="font-black text-xl text-brand-dark mb-2"><code class="bg-brand-muted text-brand-dark text-lg">/chat</code></h4>
                                <p class="font-medium opacity-90 text-sm mb-3">Inicia ou gerencia uma sessão contínua (onde o modelo lembra do contexto anterior).</p>
                                <div class="terminal-box text-xs p-3">
                                    <p class="text-white mt-1">> /chat</p>
                                    <p class="text-brand-secondary mt-1">Entrou no modo chat. Digite 'exit' para sair.</p>
                                </div>
                            </div>

                            <!-- Comando Agent -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                                <h4 class="font-black text-xl text-brand-dark mb-2"><code class="bg-brand-muted text-brand-dark text-lg">/agent</code></h4>
                                <p class="font-medium opacity-90 text-sm mb-3">O coração da automação. Gerencia as personas personalizadas (criar, listar, rodar).</p>
                                <div class="terminal-box text-xs p-3">
                                    <p class="text-white mt-1">> /agent list</p>
                                    <p class="text-white mt-1">- tradutor_pt_en</p>
                                    <p class="text-white">- revisor_codigo</p>
                                </div>
                            </div>

                            <!-- Comando Help -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                                <h4 class="font-black text-xl text-brand-dark mb-2"><code class="bg-brand-muted text-brand-dark text-lg">/help</code></h4>
                                <p class="font-medium opacity-90 text-sm mb-3">Sempre que esquecer algo, este comando lista todos os recursos disponíveis.</p>
                                <div class="terminal-box text-xs p-3">
                                    <p class="text-white mt-1">> /help</p>
                                    <p class="text-gray-400 mt-1">Available commands: /ask, /chat, /agent, /init...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            // ── 06: Agentes ──────────────────────────────────────────
            {
                title: "O Que são Agentes no Gemini CLI?",
                content: `
                    <div class="space-y-6">
                        <p class="text-xl font-bold text-brand-dark text-center">A verdadeira magia do CLI acontece quando criamos <span class="bg-brand-muted px-2 rounded">Agentes</span>.</p>
                        
                        <div class="p-6 bg-brand-dark text-brand-muted rounded-3xl shadow-xl border-l-8 border-brand-primary flex flex-col md:flex-row items-center gap-8">
                            <i class="fas fa-user-astronaut text-7xl" aria-hidden="true"></i>
                            <div>
                                <h3 class="font-black text-2xl mb-2 text-brand-muted uppercase">O Conceito de Agente:</h3>
                                <p class="text-lg">Um Agente é uma <strong>configuração pré-definida</strong> que instrui o Gemini a agir com uma persona, comportamento ou conjunto de regras específicas.</p>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-3 gap-4 mt-4">

                                <i class="fas fa-comment-dots text-brand-secondary text-3xl mb-3"></i>
                                <h4 class="font-bold text-brand-dark">Sem Agente</h4>

                            <div class="flex items-center justify-center">
                                <i class="fas fa-arrow-right text-brand-primary text-4xl"></i>

                            <div class="p-4 bg-white rounded-xl border-2 border-brand-primary shadow-sm text-center">

                            </div>

            // ── 07: Criando Agente ──────────────────────────────────────────
            {
                title: "Criando seu Primeiro Agente",
                content: `
                    <div class="space-y-6">
                        <div class="bg-white p-8 rounded-3xl border-2 border-brand-dark/10 shadow-sm text-brand-dark">
                            <h3 class="text-2xl font-black mb-4 flex items-center gap-3">
                                <i class="fas fa-plus-circle text-brand-primary" aria-hidden="true"></i> Passo a Passo
                            </h3>
                            <p class="text-lg font-medium leading-relaxed mb-6">
                                Para criar um agente, usamos o comando <code class="text-lg">/agent create</code> seguido do nome que queremos dar a ele. Não use espaços no nome.
                            </p>
                            
                            <div class="terminal-box">
                                <p class="text-white mt-1">> /agent create revisor-css</p>
                                <p class="text-brand-secondary mt-2">✔ Agente 'revisor-css' criado com sucesso!</p>
                                <p class="text-gray-400">Arquivo de configuração gerado em: ./agents/revisor-css.yaml</p>

                            </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border-2 border-brand-dark/10">
                                <p class="font-bold text-lg mb-4">Abra o arquivo <code>revisor-css.yaml</code> em seu editor favorito.</p>

                                <div class="code-block whitespace-pre-wrap">name: revisor-css
model: gemini-1.5-flash
temperature: 0.2

system_instruction: |
  Você é um Desenvolvedor Front-end Especialista em CSS.
  Sua única função é receber códigos CSS e retornar o MESMO código, porém otimizado, sem redundâncias e usando variáveis adequadas.
  Não dê explicações, retorne apenas o código.</div>

        let currentStep = 0;

        function renderStep() {
            const container = document.getElementById('steps-container');
            const counter = document.getElementById('step-counter');
            const bar = document.getElementById('progress-bar');
            
            const step = steps[currentStep];
            container.innerHTML = `
                <div class="step-content active" role="region" aria-live="polite">
                    <h2 class="no-print text-3xl md:text-4xl font-black mb-10 text-brand-dark border-l-8 border-brand-primary pl-4">${step.title}</h2>
                    <div class="content-body">${step.content}</div>
                </div>
            `;

            counter.innerText = `${currentStep + 1} / ${steps.length}`;
            bar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
            document.getElementById('aria-progress').setAttribute('aria-valuenow', Math.round(((currentStep + 1) / steps.length) * 100));
            
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').innerHTML = currentStep === steps.length - 1 
                ? 'FINALIZAR <i class="fas fa-check-circle ml-2" aria-hidden="true"></i>' 
                : 'AVANÇAR <i class="fas fa-arrow-right ml-2" aria-hidden="true"></i>';
        }

        function nextStep() { if (currentStep < steps.length - 1) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
            else if (e.key === 'ArrowLeft') prevStep();
        });

        window.onbeforeprint = function() {
            let fullHtml = `<div class="text-center mb-10 border-b-8 border-brand-dark pb-4">
                <h1 class="text-4xl font-black text-brand-dark uppercase text-center">Apostila: IA Avançada</h1>
                <p class="font-bold text-xl text-center">Aula 05 - Gemini CLI e Criação de Agentes</p>
            </div>`;
            steps.forEach((s, i) => {
                fullHtml += `<div class="step-content block mb-12 border-b-2 border-brand-dark/20 pb-10">
                    <h2 class="text-3xl font-black mb-6 text-brand-dark border-l-8 border-brand-primary pl-4">${i+1}. ${s.title}</h2>
                    <div>${s.content}</div>
                </div>`;
            });
            document.getElementById('steps-container').innerHTML = fullHtml;
        };
        window.onafterprint = renderStep;

        renderStep();
    </script>
