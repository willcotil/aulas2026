        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        .step-content {
            display: none;
            animation: slideIn 0.4s ease-out forwards;
        }

        .step-content.active {
            display: flex;
            flex-direction: column;
            min-height: 75vh;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos de Impressão */
        @media print {
            body { overflow: visible !important; background: white !important; }
            .no-print { display: none !important; }
            #main-content { padding: 0 !important; }
            .step-content { 
                display: block !important; 
                page-break-after: always; 
                border-bottom: 2px solid #f1f5f9;
                padding: 40px 0;
                opacity: 1 !important;
                transform: none !important;
            }
            .print-break { page-break-after: always; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

                        </div>
                        <h2 class="text-5xl font-black text-slate-900">Configuração Pronta!</h2>
                        <p class="text-2xl text-slate-500 max-w-2xl mx-auto">Você aprendeu a extrair requisitos e configurou sua principal ferramenta de trabalho.</p>
                        <div class="mt-12 px-10 py-4 bg-blue-600 text-white rounded-3xl font-black text-xl uppercase shadow-xl inline-block">
                            Próxima Aula: Entidades, Atributos e Tuplas
                        </div>
                    </div>
                `
            }
        ];

        let currentStep = 0;

        function renderStep() {
            const container = document.getElementById('steps-container');
            const counter = document.getElementById('step-counter');
            const bar = document.getElementById('progress-bar');
            
            const step = steps[currentStep];
            container.innerHTML = `
                <div class="step-content active">
                    <h3 class="no-print text-sm font-black uppercase text-blue-600 tracking-widest mb-4">Tópico ${currentStep + 1}</h3>
                    <h2 class="no-print text-4xl md:text-5xl font-black mb-12 text-slate-900">${step.title}</h2>
                    <div class="content-body text-lg">${step.content}</div>
                </div>
            `;

            counter.innerText = `Tópico ${currentStep + 1} / ${steps.length}`;
            bar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
            
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').innerHTML = currentStep === steps.length - 1 ? 'FINALIZAR <i class="fas fa-flag ml-2"></i>' : 'PRÓXIMO <i class="fas fa-chevron-right ml-2"></i>';
        }

        function nextStep() { if (currentStep < steps.length - 1) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
            else if (e.key === 'ArrowLeft') prevStep();
        });

        window.onbeforeprint = function() {
            let fullHtml = `<div class="text-center mb-10 border-b-8 border-blue-900 pb-4">
                <h1 class="text-4xl font-black">Apostila: Banco de Dados I</h1>
                <p>Aula 02 - Técnicas e Ferramentas Básicas de Modelagem</p>
            </div>`;
            steps.forEach((s, i) => {
                fullHtml += `<div class="step-content block mb-10 border-b pb-10">
                    <h2 class="text-2xl font-bold mb-4 text-blue-700">${i+1}. ${s.title}</h2>
                    <div>${s.content}</div>
                </div>`;
            });
            document.getElementById('steps-container').innerHTML = fullHtml;
        };
        window.onafterprint = renderStep;

        renderStep();
    </script>
</body>
</html>
