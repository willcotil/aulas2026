                                <text x="75" y="79" text-anchor="middle" class="rel-text">COMPRA</text>

                            <p class="leading-relaxed text-lg">"O <span class="bg-brand-secondary text-brand-dark px-1 rounded font-bold">MÉDICO</span> precisa <span class="bg-brand-primary text-white px-1 rounded italic font-bold">ATENDER</span> o <span class="bg-brand-secondary text-brand-dark px-1 rounded font-bold">PACIENTE</span> no hospital."</p>

                            <div class="p-6 bg-brand-primary/10 border-l-4 border-brand-primary rounded-r-xl">
                                <p class="text-brand-primary font-bold italic">"Uma entidade isolada no diagrama geralmente indica um erro de modelagem ou um requisito que foi esquecido."</p>
                            </div>

            {

                            <div class="p-6 bg-white border border-brand-secondary rounded-2xl shadow-sm text-center relative overflow-hidden">
                                <div class="w-12 h-12 bg-brand-primary text-white rounded-full flex items-center justify-center mx-auto mb-4 font-black text-xl shadow-md">2</div>

            {
                title: "Exemplo 2: Grau Binário",
                content: `
                    <div class="flex flex-col items-center space-y-8">

                        <div class="bg-brand-muted rounded-3xl h-64 w-full max-w-3xl flex items-center justify-center p-4 shadow-inner border border-brand-secondary">
                            <svg width="500" height="150" viewBox="0 0 500 150">
                                <line x1="120" y1="75" x2="210" y2="75" class="edge" />

                                <rect x="20" y="50" width="100" height="50" class="node-rect" />

            {

                    <div class="grid md:grid-cols-2 gap-10 items-center">

        let currentStep = 0;

        function renderStep() {
            const container = document.getElementById('steps-container');
            const counter = document.getElementById('step-counter');
            const bar = document.getElementById('progress-bar');
            
            const step = steps[currentStep];
            container.innerHTML = `
                <div class="step-content active">
                    <h3 class="no-print text-sm font-black uppercase text-brand-primary tracking-widest mb-4">Tópico ${currentStep + 1}</h3>
                    <h2 class="no-print text-4xl md:text-5xl font-black mb-12 text-brand-dark">${step.title}</h2>
                    <div class="content-body text-lg">${step.content}</div>
                </div>
            `;

            counter.innerText = `Tópico ${currentStep + 1} / ${steps.length}`;
            bar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
            
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').innerHTML = currentStep === steps.length - 1 ? 'FINALIZAR <i class="fas fa-flag ml-2"></i>' : 'PRÓXIMO <i class="fas fa-chevron-right ml-2"></i>';
        }

        function nextStep() { if (currentStep < steps.length - 1) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
            else if (e.key === 'ArrowLeft') prevStep();
        });

        window.onbeforeprint = function() {
            let fullHtml = `<div class="text-center mb-10 border-b-8 border-brand-dark pb-4">
                <h1 class="text-4xl font-black text-brand-dark">Apostila: Banco de Dados I</h1>
                <p>Aula 06 - MER e DER (Relacionamentos)</p>
            </div>`;
            steps.forEach((s, i) => {
                fullHtml += `<div class="step-content block mb-10 border-b pb-10">
                    <h2 class="text-2xl font-bold mb-4 text-brand-dark border-l-4 border-brand-primary pl-2">${i+1}. ${s.title}</h2>
                    <div>${s.content}</div>
                </div>`;
            });
            document.getElementById('steps-container').innerHTML = fullHtml;
        };
        window.onafterprint = renderStep;

        renderStep();
    </script>
