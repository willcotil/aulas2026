            {

                        <p class="text-2xl text-brand-secondary max-w-2xl mx-auto italic leading-relaxed">Como o computador entende os dados e como as tabelas conversam entre si.</p>

                            <span class="px-3 py-1 bg-white border border-brand-secondary/20 rounded shadow-sm">SETAS</span>

                        </div>
                    </div>
                `
            },
            {
                title: "Do Desenho à Máquina",
                content: `
                    <div class="grid md:grid-cols-2 gap-12 items-center">

                            <p class="text-xl leading-relaxed">Na última aula, modelámos a "ideia" do dado (Entidades e Atributos). Agora, temos de dizer à máquina <strong>exatamente o que vai dentro de cada atributo</strong>.</p>

                `
            },
            {
                title: "1. Tipos de Dados",
                content: `
                    <div class="space-y-8">
                        <p class="text-xl">O "Tipo de Dado" (Data Type) define a natureza do valor que uma coluna pode guardar. Isto afeta a validação, a memória ocupada e a performance.</p>
                        <div class="grid md:grid-cols-3 gap-6">
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm">
                                <h4 class="font-bold text-brand-dark text-lg mb-2"><i class="fas fa-font text-brand-accent mr-2"></i>Texto</h4>
                                <p class="text-sm">Nomes, moradas, e-mails.</p>
                            </div>
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm">
                                <h4 class="font-bold text-brand-dark text-lg mb-2"><i class="fas fa-hashtag text-brand-accent mr-2"></i>Números</h4>

                            </div>
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm">
                                <h4 class="font-bold text-brand-dark text-lg mb-2"><i class="fas fa-calendar-alt text-brand-accent mr-2"></i>Datas</h4>
                                <p class="text-sm">Nascimentos, registos, vendas.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "Principais Tipos Numéricos",
                content: `
                    <div class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="p-8 bg-brand-dark text-white rounded-3xl shadow-xl">
                                <h4 class="text-2xl font-bold mb-4 text-brand-accent">INT (Integer)</h4>
                                <p class="leading-relaxed">Números inteiros, sem casas decimais.</p>
                                <p class="mt-4 text-sm font-mono opacity-80">Ex: 1, 100, 5000, -45</p>
                                <p class="mt-2 text-xs text-brand-accent font-bold">Ideal para: IDs, Idades, Quantidades.</p>
                            </div>
                            <div class="p-8 bg-white border border-brand-secondary/30 rounded-3xl shadow-sm">
                                <h4 class="text-2xl font-bold mb-4 text-brand-dark">DECIMAL / NUMERIC</h4>
                                <p class="leading-relaxed text-brand-dark/80">Números exatos com precisão e escala (casas decimais). <code>DECIMAL(10,2)</code> significa até 10 dígitos no total, sendo 2 decimais.</p>
                                <p class="mt-4 text-sm font-mono text-brand-secondary">Ex: 19.99, 1500.50</p>
                                <p class="mt-2 text-xs font-bold text-brand-accent">Ideal para: Preços, Salários, Moeda.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "Principais Tipos de Texto",
                content: `
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="p-8 bg-white border border-brand-secondary/30 rounded-3xl shadow-sm">
                            <h4 class="text-2xl font-bold mb-4 text-brand-dark">VARCHAR(n)</h4>
                            <p class="leading-relaxed text-brand-dark/80">Texto de tamanho variável. O 'n' é o limite máximo. Se definir <code>VARCHAR(50)</code> e inserir "Ana", ocupará apenas o espaço de "Ana" e libertará o resto.</p>
                            <p class="mt-4 text-xs font-bold text-brand-accent">Ideal para: Nomes, E-mails, Moradas.</p>
                        </div>
                        <div class="p-8 bg-brand-muted border border-brand-secondary/20 rounded-3xl shadow-sm">
                            <h4 class="text-2xl font-bold mb-4 text-brand-dark">CHAR(n)</h4>
                            <p class="leading-relaxed text-brand-dark/80">Texto de tamanho fixo. Se definir <code>CHAR(2)</code> e inserir "A", o banco preencherá o resto com um espaço vazio para atingir sempre 2 caracteres.</p>
                            <p class="mt-4 text-xs font-bold text-brand-accent">Ideal para: Siglas de Estados (PT, SP, RJ), Sexo (M, F).</p>
                        </div>
                    </div>
                `
            },
            {
                title: "Tipos de Data e Hora",
                content: `
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm">
                            <h4 class="font-bold text-lg mb-2 text-brand-dark">DATE</h4>
                            <p class="text-sm text-brand-secondary mb-4">Guarda apenas a data.</p>
                            <code class="text-xs">YYYY-MM-DD (2024-03-25)</code>
                        </div>
                        <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm">
                            <h4 class="font-bold text-lg mb-2 text-brand-dark">TIME</h4>
                            <p class="text-sm text-brand-secondary mb-4">Guarda apenas a hora.</p>
                            <code class="text-xs">HH:MM:SS (14:30:00)</code>
                        </div>
                        <div class="p-6 bg-brand-primary text-white rounded-2xl shadow-lg border-b-4 border-brand-accent">
                            <h4 class="font-bold text-brand-accent text-lg mb-2">DATETIME</h4>
                            <p class="text-sm opacity-90 mb-4">Data e hora juntos (muito comum).</p>
                            <code class="text-xs bg-brand-dark text-brand-accent border-none">2024-03-25 14:30:00</code>
                        </div>
                    </div>
                `
            },
            {

                        <div class="p-8 bg-brand-accent/10 border-l-8 border-brand-accent rounded-r-3xl">
                            <p class="text-2xl leading-relaxed text-brand-dark">A <strong>Chave Primária</strong> é o atributo mestre de uma tabela. É a "âncora" que permite identificar de forma única e inequívoca uma tupla (registo).</p>
                        </div>
                        <div class="grid md:grid-cols-3 gap-6">
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-xl text-center shadow-sm">
                                <i class="fas fa-fingerprint text-3xl text-brand-accent mb-4"></i>
                                <h5 class="font-bold mb-2">Única</h5>
                                <p class="text-xs text-brand-secondary">Não podem existir dois valores iguais na coluna.</p>
                            </div>
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-xl text-center shadow-sm">
                                <i class="fas fa-ban text-3xl text-brand-accent mb-4"></i>
                                <h5 class="font-bold mb-2">Not Null</h5>
                                <p class="text-xs text-brand-secondary">Nunca pode ficar vazia/nula.</p>
                            </div>
                            <div class="p-6 bg-white border border-brand-secondary/20 rounded-xl text-center shadow-sm">
                                <i class="fas fa-lock text-3xl text-brand-accent mb-4"></i>
                                <h5 class="font-bold mb-2">Imutável</h5>
                                <p class="text-xs text-brand-secondary">O seu valor não deve ser alterado ao longo do tempo.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "Surrogate Keys (A Boa Prática)",
                content: `
                    <div class="grid md:grid-cols-2 gap-10 items-center">

                            <h4 class="text-2xl font-bold text-brand-dark">Chaves Artificiais</h4>
                            <p class="text-lg leading-relaxed">Na indústria, <strong>evitamos usar atributos naturais</strong> (como NIF ou Email) como Chave Primária. Em vez disso, o SGBD cria um atributo <code>id</code> do tipo <code>INT</code>.</p>
                            <ul class="space-y-3 text-sm text-brand-secondary">
                                <li><i class="fas fa-bolt text-brand-accent mr-2"></i> <strong>Performance:</strong> O CPU processa Inteiros mais rápido que Textos.</li>
                                <li><i class="fas fa-shield-alt text-brand-accent mr-2"></i> <strong>Segurança contra erros:</strong> Se alguém se enganar no NIF, altera-se. O <code>id</code> é invisível ao erro humano.</li>

                        </div>
                        <div class="bg-brand-primary rounded-3xl h-64 flex flex-col items-center justify-center p-6 shadow-xl border-t-4 border-brand-accent">
                            <code class="text-xl text-brand-accent bg-transparent mb-4">id INT AUTO_INCREMENT</code>
                            <p class="text-white text-center">O banco gera "1, 2, 3..." automaticamente.</p>
                        </div>
                    </div>
                `
            },
            {
                title: "3. Chave Única (Unique Key)",
                content: `

                            <div class="p-4 bg-brand-muted border border-brand-secondary/30 rounded-lg text-sm">
                                <p><strong>PK:</strong> Identifica a linha para a máquina (ex: <code>id: 150</code>).</p>
                                <p class="mt-2"><strong>UNIQUE:</strong> Impede duplicações de negócio (ex: <code>Não deixar cadastrar 2 e-mails iguais</code>).</p>

                        <div class="bg-white rounded-3xl h-64 flex items-center justify-center p-4 shadow-sm border border-brand-secondary/20">

                                <ellipse cx="190" cy="40" rx="35" ry="15" fill="#ffffff" stroke="#FF6500" stroke-width="2" />
                                <text x="190" y="44" text-anchor="middle" font-size="10" fill="#000000" style="text-decoration: underline; text-decoration-style: dashed;">Email</text>

            {

                        <div class="p-8 bg-brand-primary text-white rounded-3xl shadow-xl border-b-4 border-brand-accent">
                            <h4 class="text-2xl font-bold mb-4 text-brand-accent">A Ponte entre Tabelas</h4>
                            <p class="text-lg leading-relaxed">As bases de dados relacionais têm este nome porque as tabelas "relacionam-se". A <strong>Chave Estrangeira (FK)</strong> é um atributo numa tabela que aponta/referencia a Chave Primária (PK) de outra tabela.</p>

            {

                            <h4 class="text-brand-accent font-bold text-xl mb-4 border-b border-brand-secondary pb-2">Tipos de Dados Frequentes</h4>
                            <ul class="space-y-4">
                                <li><strong class="text-white">INT:</strong> Números Inteiros.</li>

                    <div class="space-y-6">

                            "Analise a entidade <strong>LIVRO</strong>. Ela possui os atributos: <code>id</code>, <code>titulo</code>, <code>ano_publicacao</code>, <code>preco_venda</code> e <code>isbn</code> (que é um código único do livro no formato texto de 13 caracteres)."
                        </div>
                        <p class="font-bold text-brand-dark">Para cada atributo, defina o Tipo de Dado ideal e se é PK, Unique ou normal.</p>
                        
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="no-print mt-4 px-6 py-2 bg-brand-primary text-white rounded-lg font-bold hover:bg-brand-accent transition shadow-md">
                            <i class="fas fa-eye mr-2"></i> Ver Resposta (Prática Guiada)
                        </button>
                        
                        <div class="hidden resposta-gabarito bg-brand-muted border border-brand-secondary/20 p-6 rounded-xl mt-4 animate-in slide-in-from-top-2">
                            <ul class="space-y-2 text-sm text-brand-dark font-mono">
                                <li>• <strong class="font-sans">id:</strong> INT (Primary Key)</li>
                                <li>• <strong class="font-sans">titulo:</strong> VARCHAR(255)</li>
                                <li>• <strong class="font-sans">ano_publicacao:</strong> INT</li>
                                <li>• <strong class="font-sans">preco_venda:</strong> DECIMAL(10,2)</li>
                                <li>• <strong class="font-sans">isbn:</strong> CHAR(13) ou VARCHAR(13) (Unique Key)</li>
                            </ul>
                        </div>
                    </div>
                `
            },
            {
                title: "Exercício Prático 2: O Stand de Automóveis",
                content: `
                    <div class="space-y-6">
                        <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm text-lg leading-relaxed">
                            "O stand necessita de gerir os seus <strong>Veículos</strong>. Para cada veículo, precisamos de guardar o <code>id</code>, a <code>matricula</code> (placa - não pode haver repetidas), o <code>modelo</code>, a <code>marca</code>, o <code>ano_fabrico</code> e o <code>valor_compra</code>."
                        </div>
                        <p class="font-bold text-brand-dark">No seu caderno: Liste os atributos, defina o tipo de dado de cada um e indique as chaves (PK e Unique).</p>
                        
                        <div class="mt-8 p-10 border-2 border-dashed border-brand-secondary/30 rounded-2xl bg-brand-muted flex flex-col items-center justify-center text-brand-secondary/70">
                            <i class="fas fa-car text-4xl mb-4 opacity-50"></i>
                            <p class="italic font-bold">Resolução individual no caderno</p>
                        </div>
                    </div>
                `
            },
            {
                title: "Exercício Prático 3: A Loja Online",
                content: `
                    <div class="space-y-6">
                        <div class="p-6 bg-white border border-brand-secondary/20 rounded-2xl shadow-sm text-lg leading-relaxed">
                            "Observe o diagrama onde <strong>CLIENTE</strong> faz <strong>PEDIDOS</strong>. O Cliente tem (id, nome, email). O Pedido tem (id, data_pedido, total_pago)."
                        </div>
                        <p class="font-bold text-brand-dark">No seu caderno: Como faria a ligação entre estas duas tabelas? Crie o atributo necessário (FK) e diga em que tabela ele deve ficar.</p>
                        
                        <div class="mt-8 p-10 border-2 border-dashed border-brand-secondary/30 rounded-2xl bg-brand-muted flex flex-col items-center justify-center text-brand-secondary/70">
                            <i class="fas fa-link text-4xl mb-4 opacity-50"></i>
                            <p class="italic font-bold">Resolução individual no caderno</p>
                        </div>
                    </div>
                `
            }
        ];

        let currentStep = 0;

        function renderStep() {
            const container = document.getElementById('steps-container');
            const counter = document.getElementById('step-counter');
            const bar = document.getElementById('progress-bar');
            
            const step = steps[currentStep];
            container.innerHTML = `
                <div class="step-content active">
                    <h3 class="no-print text-sm font-black uppercase text-brand-accent tracking-widest mb-4">Tópico ${currentStep + 1}</h3>
                    <h2 class="no-print text-4xl md:text-5xl font-black mb-12 text-brand-dark">${step.title}</h2>
                    <div class="content-body text-lg">${step.content}</div>
                </div>
            `;

            counter.innerText = `Tópico ${currentStep + 1} / ${steps.length}`;
            bar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
            
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').innerHTML = currentStep === steps.length - 1 ? 'FINALIZAR <i class="fas fa-flag ml-2"></i>' : 'PRÓXIMO <i class="fas fa-chevron-right ml-2"></i>';
        }

        function nextStep() { if (currentStep < steps.length - 1) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
            else if (e.key === 'ArrowLeft') prevStep();
        });

        window.onbeforeprint = function() {
            let fullHtml = `<div class="text-center mb-10 border-b-8 border-brand-dark pb-4">
                <h1 class="text-4xl font-black text-brand-dark">Apostila: Base de Dados I</h1>
                <p>Aula 04 - Tipos de Dados e Chaves</p>
            </div>`;
            steps.forEach((s, i) => {
                fullHtml += `<div class="step-content block mb-10 border-b pb-10">
                    <h2 class="text-2xl font-bold mb-4 text-brand-dark border-l-4 border-brand-accent pl-2">${i+1}. ${s.title}</h2>
                    <div>${s.content}</div>
                </div>`;
            });
            document.getElementById('steps-container').innerHTML = fullHtml;
        };
        window.onafterprint = renderStep;

        renderStep();
    </script>
</body>
</html>
