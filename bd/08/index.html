<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados - Aula 09: Mapeamento no Dicionário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark:      '#576A8F', /* Dark/Muted Blue */
                            primary:   '#FF7444', /* Bright Orange (Used for PK) */
                            secondary: '#B7BDF7', /* Light Blue (Used for FK / accents) */
                            muted:     '#FFF8DE', /* Cream/Very Light Yellow (Cards) */
                            surface:   '#FFFFFF', /* White cards */
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FCFCFC; /* Fundo branco/suave para não cansar a vista */
            color: #576A8F;
            overflow: hidden;
        }

        .step-content {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .step-content.active {
            display: flex;
            flex-direction: column;
            min-height: 70vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        @media print {
            body { overflow: visible !important; background: white !important; color: black !important; }
            .no-print { display: none !important; }
            #main-content { padding: 0 !important; }
            .step-content {
                display: block !important;
                page-break-after: auto;
                border-bottom: 2px solid #ccc;
                padding: 40px 0;
                opacity: 1 !important;
                transform: none !important;
            }
            .resposta-gabarito { display: block !important; }
        }

        /* Cores consistentes para o SVG baseadas na nova paleta */
        .node-rect { fill: #ffffff; stroke: #576A8F; stroke-width: 4; rx: 12px; }
        .node-text { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; fill: #576A8F; }
        .edge { stroke: #576A8F; stroke-width: 3; fill: none; }
        .rel-polygon { fill: #FFF8DE; stroke: #FF7444; stroke-width: 3; }
        .rel-text { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 800; fill: #576A8F; }

        code { font-family: 'JetBrains Mono', monospace; background: #ffffff; border: 2px solid #576A8F; padding: 2px 8px; border-radius: 6px; color: #576A8F; font-weight: 700; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #FCFCFC; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #576A8F; border-radius: 10px; border: 2px solid #FCFCFC; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="no-print h-20 bg-white text-brand-dark px-8 flex items-center justify-between sticky top-0 z-50 shadow-md border-b-4 border-brand-dark">
        <div class="flex items-center gap-4 z-10">
            <div class="bg-brand-dark text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-inner">
                <i class="fas fa-plug text-xl"></i>
            </div>
            <h1 class="font-extrabold text-2xl tracking-tight">Banco de Dados <span class="text-brand-primary opacity-90">| Conexões</span></h1>
        </div>

        <div class="flex items-center gap-4 z-10">
            <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-brand-muted hover:bg-brand-secondary hover:text-brand-dark rounded-xl text-brand-dark font-bold transition shadow-sm border border-brand-dark/20">
                <i class="fas fa-print"></i> IMPRIMIR
            </button>
            <button onclick="toggleFullscreen()" class="w-10 h-10 bg-brand-muted rounded-xl text-brand-dark hover:bg-brand-dark hover:text-white transition flex items-center justify-center border border-brand-dark/20">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </header>

    <div class="no-print h-2 w-full bg-white overflow-hidden border-b border-brand-dark/10">
        <div id="progress-bar" class="h-full bg-brand-primary transition-all duration-500 w-0"></div>
    </div>

    <main id="main-content" class="flex-grow flex items-center justify-center p-6 md:p-10 overflow-y-auto custom-scrollbar">
        <div id="steps-container" class="w-full max-w-5xl"></div>
    </main>

    <footer class="no-print h-24 bg-white border-t-4 border-brand-dark px-8 flex items-center justify-between sticky bottom-0 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        <button id="btn-prev" onclick="prevStep()" class="flex items-center gap-3 px-8 py-3 bg-brand-muted text-brand-dark rounded-2xl font-bold hover:bg-brand-dark hover:text-white transition disabled:opacity-30 disabled:hover:bg-brand-muted disabled:hover:text-brand-dark border-2 border-brand-dark/20 disabled:border-transparent text-lg">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </button>

        <div class="hidden md:flex flex-col items-center">
            <span id="step-counter" class="text-sm font-black text-brand-dark uppercase tracking-widest bg-brand-muted px-4 py-1 rounded-full border border-brand-dark/20">1 / 16</span>
        </div>

        <button id="btn-next" onclick="nextStep()" class="flex items-center gap-3 px-10 py-3 bg-brand-dark text-white rounded-2xl font-black hover:bg-brand-primary transition shadow-lg text-lg border-b-4 border-black/30 hover:border-b-0 hover:translate-y-1">
            AVANÇAR <i class="fas fa-arrow-right"></i>
        </button>
    </footer>

    <script>
        const steps = [
            // ── 01: Título ──────────────────────────────────────────────────
            {
                title: "A Ponte Entre as Tabelas",
                content: `
                    <div class="text-center space-y-8 py-10">
                        <div class="inline-block p-8 bg-white border-4 border-brand-dark rounded-[2rem] text-brand-primary mb-4 shadow-xl shadow-brand-dark/10">
                            <i class="fas fa-network-wired text-8xl"></i>
                        </div>
                        <h2 class="text-5xl md:text-6xl font-black text-brand-dark leading-tight">Mapeamento no Dicionário</h2>
                        <p class="text-2xl text-brand-dark/80 max-w-2xl mx-auto font-semibold">Como transformar as linhas do DER em ligações reais de Banco de Dados.</p>
                        <div class="flex justify-center gap-4 text-brand-dark text-sm mt-12 font-bold opacity-50">
                            <span class="px-4 py-2 bg-white rounded-xl shadow-sm border-2 border-brand-dark/20"><i class="fas fa-arrow-left mr-2"></i> SETAS <i class="fas fa-arrow-right ml-2"></i></span>
                        </div>
                    </div>
                `
            },
            // ── 02: O Problema ──────────────────────────────────────────────
            {
                title: "O Computador Não Enxerga Linhas",
                content: `
                    <div class="grid md:grid-cols-2 gap-10 items-center">
                        <div class="space-y-6 bg-white p-8 rounded-3xl shadow-lg border-2 border-brand-dark/10">
                            <p class="text-2xl font-bold text-brand-dark leading-relaxed">No papel, fazemos uma linha com um losango para mostrar que as entidades se conhecem.</p>

                            <div class="p-4 bg-brand-muted rounded-xl border-l-4 border-brand-primary text-lg font-bold">
                                Como dizemos à máquina que o Aluno 01 pertence à Turma 05?
                            </div>
                        </div>

                            <svg width="400" height="150" viewBox="0 0 400 150">
                                <rect x="20" y="50" width="100" height="50" class="node-rect" />

                                <polygon points="485,115 525,140 485,165 445,140" class="rel-polygon" />

        let currentStep = 0;

        function renderStep() {
            const container = document.getElementById('steps-container');
            const counter = document.getElementById('step-counter');
            const bar = document.getElementById('progress-bar');
            
            const step = steps[currentStep];
            container.innerHTML = `
                <div class="step-content active">
                    <h2 class="no-print text-4xl md:text-5xl font-black mb-10 text-brand-dark">${step.title}</h2>
                    <div class="content-body">${step.content}</div>
                </div>
            `;

            counter.innerText = `${currentStep + 1} / ${steps.length}`;
            bar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
            
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').innerHTML = currentStep === steps.length - 1 
                ? 'FINALIZAR <i class="fas fa-check-circle ml-2"></i>' 
                : 'AVANÇAR <i class="fas fa-arrow-right ml-2"></i>';
        }

        function nextStep() { if (currentStep < steps.length - 1) { currentStep++; renderStep(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); } }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
            else if (e.key === 'ArrowLeft') prevStep();
        });

        window.onbeforeprint = function() {
            let fullHtml = `<div class="text-center mb-10 border-b-8 border-brand-dark pb-4">
                <h1 class="text-4xl font-black text-brand-dark">Apostila: Banco de Dados I</h1>
                <p class="font-bold text-xl">Aula 09 - Mapeamento de Relacionamentos (Chaves Estrangeiras)</p>
            </div>`;
            steps.forEach((s, i) => {
                fullHtml += `<div class="step-content block mb-12 border-b-2 border-brand-dark/20 pb-10">
                    <h2 class="text-3xl font-black mb-6 text-brand-dark border-l-8 border-brand-primary pl-4">${i+1}. ${s.title}</h2>
                    <div>${s.content}</div>
                </div>`;
            });
            document.getElementById('steps-container').innerHTML = fullHtml;
        };
        window.onafterprint = renderStep;

        renderStep();
    </script>
